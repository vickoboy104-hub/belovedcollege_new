name: Quality checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, gd, iconv, intl, json, libxml, mbstring, openssl, pcre, pdo, pdo_sqlite, session, simplexml, sodium, sqlite3, tokenizer, xml, xmlwriter, zip
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Prepare environment files
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite

      - name: Configure Composer authentication
        run: composer config --global github-oauth.github.com "${{ github.token }}"

      - name: Validate Composer files
        run: composer validate --no-check-publish

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader -vvv

      - name: Prepare Laravel database
        run: |
          php artisan key:generate
          php artisan migrate:fresh --seed --force

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify routes
        run: php artisan route:list

      - name: Run automated tests
        run: php artisan test
